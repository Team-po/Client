name: Feature request
description: 새 기능이나 개선 아이디어를 제안합니다.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 어떤 사용자 문제나 팀 운영 문제를 해결하려는지 적어주세요.
      placeholder: 예) 프로젝트 상태 변경 이력이 없어 운영자가 현재 진행 상황을 추적하기 어렵습니다.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 해결책
      description: 원하는 동작이나 화면을 구체적으로 적어주세요.
      placeholder: 예) 프로젝트 상세 화면에 상태 변경 타임라인과 변경자를 함께 보여줍니다.
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: 기대 효과
      description: 왜 필요한지, 어떤 지표나 경험이 좋아지는지 적어주세요.
      placeholder: 예) 운영 가시성이 올라가고 상태 변경 관련 문의가 줄어듭니다.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 범위 및 제약
      description: 관련 도메인, API, 디자인 제약이 있으면 적어주세요.
      placeholder: 예) `projects` 도메인, OpenAPI 스펙 갱신 필요 여부, 관리자 전용 여부
    validations:
      required: false
  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 와이어프레임, 문서, 관련 이슈가 있으면 남겨주세요.
      placeholder: 예) Figma 링크, 관련 이슈 번호, API 스펙 위치
    validations:
      required: false
