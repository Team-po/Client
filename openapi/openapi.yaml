        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'
  /team-space/{projectGroupId}/github/users/{targetUserId}/weekly-summaries:
    get:
      tags: [TeamSpace]
      security:
        - bearerAuth: []
      summary: Get weekly GitHub activity summaries for a team member
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
        - $ref: '#/components/parameters/TargetUserId'
      responses:
        '200':
          description: Weekly GitHub summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GithubWeeklySummaryListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /team-space/{projectGroupId}/github/users/{targetUserId}/weekly-summaries/{weeklyGithubSummaryId}:
    get:
      tags: [TeamSpace]
      security:
        - bearerAuth: []
      summary: Get one weekly GitHub activity summary for a team member
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
        - $ref: '#/components/parameters/TargetUserId'
        - $ref: '#/components/parameters/WeeklyGithubSummaryId'
      responses:
        '200':
          description: Weekly GitHub summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GithubWeeklySummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProjectGroupId:
      in: path
      name: projectGroupId
      required: true
      schema:
        type: integer
        format: int64
    TargetUserId:
      in: path
      name: targetUserId
      required: true
      schema:
        type: integer
        format: int64
    ChecklistId:
      in: path
      name: checklistId
      required: true
      schema:
        type: integer
        format: int64
    DevGuideId:
      in: path
      name: devGuideId
      required: true
      schema:
        type: integer
        format: int64
    GithubRepositoryId:
      in: path
      name: githubRepositoryId
      required: true
      schema:
        type: integer
        format: int64
    WeeklyGithubSummaryId:
      in: path
      name: weeklyGithubSummaryId
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    ApiError:
      type: object
      additionalProperties: false
      required: [message]
      properties:
        code:
          type: string
          examples: [INVALID_INPUT_FIELD]
        message:
          type: string
        fieldErrors:
          type:
            - object
            - 'null'
          additionalProperties:
            type: string
    SendEmailRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email
    ValidateAuthNumberRequest:
      type: object
      additionalProperties: false
      required: [email, authNumber]
      properties:
        email:
          type: string
          format: email
        authNumber:
          type: integer
          minimum: 100000
          maximum: 999999
    SignUpRequest:
      type: object
      additionalProperties: false
      required: [email, password, nickname, level]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        nickname:
          type: string
        level:
          type: integer
          minimum: 1
          maximum: 5
        profileImageKey:
          type:
            - string
            - 'null'
          pattern: '^images/(sign-up|users/\d+)/[A-Za-z0-9-]+\.(jpg|png|gif|webp)$'
    SignInRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    SignInResponse:
      type: object
      additionalProperties: false
      required: [accessToken, refreshToken, expiresAt]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: string
          format: date-time
    RequestPasswordResetRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email
    ResetPasswordRequest:
      type: object
      additionalProperties: false
      required: [token, newPassword]
      properties:
        token:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 8
    GithubOAuthTokenRequest:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code:
          type: string
          minLength: 1
        level:
          type: integer
          minimum: 1
          maximum: 5
    GithubLinkStartResponse:
      type: object
      additionalProperties: false
      required: [authorizationUrl]
      properties:
        authorizationUrl:
          type: string
    RefreshTokenRequest:
      type: object
      additionalProperties: false
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    RefreshTokenResponse:
      type: object
      additionalProperties: false
      required: [accessToken, expiresAt]
      properties:
        accessToken:
          type: string
        expiresAt:
          type: string
          format: date-time
    UserProfile:
      type: object
      additionalProperties: false
      required: [email, profileImage, description, nickname, temperature, level, isGithubLogin, isGithubLinked, githubUsername]
      properties:
        email:
          type: string
          format: email
        profileImage:
          type:
            - string
            - 'null'
        description:
          type:
            - string
            - 'null'
        nickname:
          type: string
        temperature:
          type: integer
        level:
          type: integer
          minimum: 1
          maximum: 5
        isGithubLogin:
          type: boolean
        isGithubLinked:
          type: boolean
        githubUsername:
          type:
            - string
            - 'null'
    EditProfileRequest:
      type: object
      additionalProperties: false
      required: [description, nickname, level]
      properties:
        description:
          type:
            - string
            - 'null'
        nickname:
          type: string
        level:
          type: integer
          minimum: 1
          maximum: 5
        profileImageKey:
          type:
            - string
            - 'null'
    EditPasswordRequest:
      type: object
      additionalProperties: false
      required: [currentPassword, afterPassword]
      properties:
        currentPassword:
          type: string
          minLength: 8
        afterPassword:
          type: string
          minLength: 8
    ValidateDeleteUserEmailRequest:
      type: object
      additionalProperties: false
      required: [authNumber]
      properties:
        authNumber:
          type: integer
          minimum: 100000
          maximum: 999999
    ProfileImageUploadUrlRequest:
      type: object
      additionalProperties: false
      required: [contentType]
      properties:
        contentType:
          type: string
          enum: [image/jpeg, image/png, image/gif, image/webp]
    ProfileImageUploadUrlResponse:
      type: object
      additionalProperties: false
      required: [uploadUrl, formFields, objectKey, contentType, maxFileSizeBytes, expiresAt]
      properties:
        uploadUrl:
          type: string
          format: uri
        formFields:
          type: object
          additionalProperties:
            type: string
        objectKey:
          type: string
        contentType:
          type: string
        maxFileSizeBytes:
          type: integer
          format: int64
        expiresAt:
          type: string
          format: date-time
    MatchRole:
      type: string
      enum: [DESIGN, BACKEND, FRONTEND]
    MatchStatus:
      type: string
      enum: [WAITING, MATCHING, MATCHED, CANCELED]
    ProjectRequest:
      type: object
      additionalProperties: false
      required: [role]
      properties:
        role:
          $ref: '#/components/schemas/MatchRole'
        projectTitle:
          type:
            - string
            - 'null'
        projectDescription:
          type:
            - string
            - 'null'
        projectMvp:
          type:
            - string
            - 'null'
      description: If any project field is filled, projectTitle, projectDescription, and projectMvp must all be filled.
    ProjectRequestStatus:
      type: object
      additionalProperties: false
      required: [status, role]
      properties:
        status:
          $ref: '#/components/schemas/MatchStatus'
        role:
          $ref: '#/components/schemas/MatchRole'
    MatchMemberResponse:
      type: object
      additionalProperties: false
      required: [members]
      properties:
        members:
          type: array
          items:
            $ref: '#/components/schemas/MatchMember'
    MatchMember:
      type: object
      additionalProperties: false
      required: [userId, nickname, role, level, temperature, profileImageKey, isHost, isAccepted]
      properties:
        userId:
          type: integer
          format: int64
        nickname:
          type: string
        role:
          $ref: '#/components/schemas/MatchRole'
        level:
          type: integer
        temperature:
          type: integer
        profileImageKey:
          type:
            - string
            - 'null'
        isHost:
          type: boolean
        isAccepted:
          type:
            - boolean
            - 'null'
    MatchProjectResponse:
      type: object
      additionalProperties: false
      required: [projectTitle, projectDescription, projectMvp]
      properties:
        projectTitle:
          type: string
        projectDescription:
          type: string
        projectMvp:
          type: string
    GetMyProjectGroupResponse:
      type: object
      additionalProperties: false
      required:
        - currentUserId
        - projectGroupId
        - projectName
        - projectTitle
        - projectDescription
        - projectMvp
        - members
      properties:
        currentUserId:
          type: integer
          format: int64
        projectGroupId:
          type: integer
          format: int64
        projectName:
          type: string
        projectTitle:
          type: string
        projectDescription:
          type:
            - string
            - 'null'
        projectMvp:
          type:
            - string
            - 'null'
        members:
          type: array
          items:
            $ref: '#/components/schemas/ProjectGroupMember'
    UpdateProjectGroupNameRequest:
      type: object
      additionalProperties: false
      required: [projectName]
      properties:
        projectName:
          type: string
          minLength: 1
          maxLength: 255
    ProjectGroupMember:
      type: object
      additionalProperties: false
      required:
        - userId
        - nickname
        - profileImage
        - level
        - temperature
        - memberRole
        - groupRole
        - admin
      properties:
        userId:
          type: integer
          format: int64
        nickname:
          type: string
        profileImage:
          type:
            - string
            - 'null'
        level:
          type: integer
        temperature:
          type: integer
        memberRole:
          $ref: '#/components/schemas/MatchRole'
        groupRole:
          type: string
          enum: [HOST, MEMBER]
        admin:
          type: boolean
    ProjectChecklistStatus:
      type: string
      enum: [TODO, DONE]
    ChecklistAiAdvice:
      type: object
      additionalProperties: false
      required: [summary, recommendedFlow, considerations, improvementPoints]
      properties:
        summary:
          type: string
        recommendedFlow:
          type: array
          minItems: 3
          maxItems: 5
          items:
            type: string
        considerations:
          type: array
          minItems: 2
          maxItems: 4
          items:
            type: string
        improvementPoints:
          type: array
          minItems: 1
          maxItems: 3
          items:
            type: string
    ProjectChecklist:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - description
        - status
        - dueDate
        - createdAt
        - createdByUserId
        - createdByNickname
        - assigneeUserId
        - assigneeNickname
        - aiAdvice
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type:
            - string
            - 'null'
        status:
          $ref: '#/components/schemas/ProjectChecklistStatus'
        dueDate:
          type:
            - string
            - 'null'
          format: date
        createdAt:
          type: string
          format: date-time
        createdByUserId:
          type: integer
          format: int64
        createdByNickname:
          type: string
        assigneeUserId:
          type:
            - integer
            - 'null'
          format: int64
        assigneeNickname:
          type:
            - string
            - 'null'
        aiAdvice:
          anyOf:
            - $ref: '#/components/schemas/ChecklistAiAdvice'
            - type: 'null'
    CreateProjectChecklistRequest:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type:
            - string
            - 'null'
          maxLength: 3000
        dueDate:
          type:
            - string
            - 'null'
          format: date
        assigneeUserId:
          type:
            - integer
            - 'null'
          format: int64
    UpdateProjectChecklistRequest:
      type: object
      additionalProperties: false
      required: [title, status]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type:
            - string
            - 'null'
          maxLength: 3000
        status:
          $ref: '#/components/schemas/ProjectChecklistStatus'
        dueDate:
          type:
            - string
            - 'null'
          format: date
        assigneeUserId:
          type:
            - integer
            - 'null'
          format: int64
    GenerateChecklistAdviceResponse:
      type: object
      additionalProperties: false
      required: [checklistId, aiAdvice]
      properties:
        checklistId:
          type: integer
          format: int64
        aiAdvice:
          $ref: '#/components/schemas/ChecklistAiAdvice'
    ChatMessageType:
      type: string
      enum: [TEXT, SYSTEM]
    ChatMessage:
      type: object
      additionalProperties: false
      required:
        - messageId
        - projectGroupId
        - senderUserId
        - senderNickname
        - senderProfileImage
        - type
        - content
        - createdAt
        - mine
      properties:
        messageId:
          type: integer
          format: int64
        projectGroupId:
          type: integer
          format: int64
        senderUserId:
          type: integer
          format: int64
        senderNickname:
          type: string
        senderProfileImage:
          type:
            - string
            - 'null'
        type:
          $ref: '#/components/schemas/ChatMessageType'
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        mine:
          type: boolean
    ChatMessagePage:
      type: object
      additionalProperties: false
      required: [messages, nextBeforeMessageId, hasNext]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
        nextBeforeMessageId:
          type:
            - integer
            - 'null'
          format: int64
        hasNext:
          type: boolean
    MarkChatReadRequest:
      type: object
      additionalProperties: false
      required: [lastReadMessageId]
      properties:
        lastReadMessageId:
          type: integer
          format: int64
    ChatReadState:
      type: object
      additionalProperties: false
      required: [lastReadMessageId, updatedAt]
      properties:
        lastReadMessageId:
          type:
            - integer
            - 'null'
          format: int64
        updatedAt:
          type: string
          format: date-time
    TeamRuleResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - projectGroupId
        - content
        - version
        - updatedAt
        - updatedByNickname
      properties:
        id:
          type: integer
          format: int64
        projectGroupId:
          type: integer
          format: int64
        content:
          type: string
        version:
          type: integer
          format: int64
        updatedAt:
          type: string
          format: date-time
        updatedByNickname:
          type: string
    UpdateTeamRuleRequest:
      type: object
      additionalProperties: false
      required: [content, version]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 10000
        version:
          type: integer
          format: int64
    GithubInstallationStatus:
      type: object
      additionalProperties: false
      required: [connected, organizationLogin, repositoryCount]
      properties:
        connected:
          type: boolean
        organizationLogin:
          type:
            - string
            - 'null'
        repositoryCount:
          type: integer
          format: int64
    GithubAppInstallationUrl:
      type: object
      additionalProperties: false
      required: [installUrl]
      properties:
        installUrl:
          type: string
          format: uri
    CompleteGithubAppInstallationRequest:
      type: object
      additionalProperties: false
      required: [installationId, setupAction, state]
      properties:
        installationId:
          type: integer
          format: int64
        setupAction:
          type: string
          minLength: 1
        state:
          type: string
          minLength: 1
    GithubRepository:
      type: object
      additionalProperties: false
      required: [githubRepositoryId, repoName, fullName]
      properties:
        githubRepositoryId:
          type: integer
          format: int64
        repoName:
          type: string
        fullName:
          type: string
    GithubRepositoryListResponse:
      type: object
      additionalProperties: false
      required: [repositories]
      properties:
        repositories:
          type: array
          items:
            $ref: '#/components/schemas/GithubRepository'
    SetGithubRepositoryListRequest:
      type: object
      additionalProperties: false
      required: [githubRepositoryIds]
      properties:
        githubRepositoryIds:
          type: array
          items:
            type: integer
            format: int64
    GithubRepositoryContributionResponse:
      type: object
      additionalProperties: false
      required: [githubRepositoryId, repoName, fullName, contributors]
      properties:
        githubRepositoryId:
          type: integer
          format: int64
        repoName:
          type: string
        fullName:
          type: string
        contributors:
          type: array
          items:
            $ref: '#/components/schemas/GithubRepositoryContributor'
    GithubRepositoryContributor:
      type: object
      additionalProperties: false
      required:
        - userId
        - githubUserId
        - githubUsername
        - mergedPrCount
        - linkedIssueCount
        - additions
        - deletions
        - changedFiles
        - contributionScore
      properties:
        userId:
          type: integer
