openapi: 3.1.0
info:
  title: Team-po Server API
  version: 0.2.0
  summary: Client-facing contract mirrored from the current Spring controllers.
servers:
  - url: /api
    description: API base path
tags:
  - name: Auth
  - name: Users
  - name: Match
  - name: ProjectGroups
paths:
  /signup/email:
    post:
      tags: [Auth]
      summary: Send a signup email auth number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendEmailRequest'
      responses:
        '200':
          description: Auth number sent
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/BadGateway'
  /signup/number-validation:
    post:
      tags: [Auth]
      summary: Validate a signup email auth number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateAuthNumberRequest'
      responses:
        '200':
          description: Auth number validated
        '400':
          $ref: '#/components/responses/BadRequest'
  /users/sign-up:
    post:
      tags: [Users]
      summary: Sign up after email auth validation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '200':
          description: User created
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /users/profile-image/upload-url:
    post:
      tags: [Users]
      summary: Create a signup profile image POST upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileImageUploadUrlRequest'
      responses:
        '200':
          description: Upload URL issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileImageUploadUrlResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /users/check-email:
    get:
      tags: [Users]
      summary: Check whether an email is available
      parameters:
        - in: query
          name: email
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Email is available
        '409':
          $ref: '#/components/responses/Conflict'
  /users/sign-in:
    post:
      tags: [Auth]
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: Signed in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignInResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/refresh-token:
    post:
      tags: [Auth]
      summary: Refresh an access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Access token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/me:
    get:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Get the current user's profile
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Update the current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditProfileRequest'
      responses:
        '200':
          description: Profile updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Soft-delete the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteUserRequest'
      responses:
        '200':
          description: User deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/me/profile-image/upload-url:
    post:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Create a profile update image POST upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileImageUploadUrlRequest'
      responses:
        '200':
          description: Upload URL issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileImageUploadUrlResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/me/password:
    put:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Change the current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditPasswordRequest'
      responses:
        '200':
          description: Password changed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /match/request:
    post:
      tags: [Match]
      security:
        - bearerAuth: []
      summary: Create a project matching request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectRequest'
      responses:
        '200':
          description: Request created
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /match/status:
    get:
      tags: [Match]
      security:
        - bearerAuth: []
      summary: Get the current user's active match request status
      responses:
        '200':
          description: Active status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectRequestStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /match/{matchId}/members:
    get:
      tags: [Match]
      security:
        - bearerAuth: []
      summary: Get members in a match session
      parameters:
        - $ref: '#/components/parameters/MatchId'
      responses:
        '200':
          description: Match members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchMemberResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /match/{matchId}/project:
    get:
      tags: [Match]
      security:
        - bearerAuth: []
      summary: Get the host project details for a match session
      parameters:
        - $ref: '#/components/parameters/MatchId'
      responses:
        '200':
          description: Match project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchProjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /match/{matchId}/accept:
    post:
      tags: [Match]
      security:
        - bearerAuth: []
      summary: Accept a match session
      parameters:
        - $ref: '#/components/parameters/MatchId'
      responses:
        '200':
          description: Match accepted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /match/{matchId}/reject:
    post:
      tags: [Match]
      security:
        - bearerAuth: []
      summary: Reject a match session
      parameters:
        - $ref: '#/components/parameters/MatchId'
      responses:
        '200':
          description: Match rejected
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /match/cancel:
    post:
      tags: [Match]
      security:
        - bearerAuth: []
      summary: Cancel the current user's waiting or matching request
      responses:
        '200':
          description: Match request canceled
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /project-groups/{projectGroupId}/admins/{targetUserId}:
    patch:
      tags: [ProjectGroups]
      security:
        - bearerAuth: []
      summary: Grant admin permission to a project group member
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
        - $ref: '#/components/parameters/TargetUserId'
      responses:
        '200':
          description: Admin permission granted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [ProjectGroups]
      security:
        - bearerAuth: []
      summary: Revoke admin permission from a project group member
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
        - $ref: '#/components/parameters/TargetUserId'
      responses:
        '200':
          description: Admin permission revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    MatchId:
      in: path
      name: matchId
      required: true
      schema:
        type: integer
        format: int64
    ProjectGroupId:
      in: path
      name: projectGroupId
      required: true
      schema:
        type: integer
        format: int64
    TargetUserId:
      in: path
      name: targetUserId
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    ApiError:
      type: object
      additionalProperties: false
      required: [message]
      properties:
        code:
          type: string
          examples: [INVALID_INPUT_FIELD]
        message:
          type: string
        fieldErrors:
          type:
            - object
            - 'null'
          additionalProperties:
            type: string
    SendEmailRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email
    ValidateAuthNumberRequest:
      type: object
      additionalProperties: false
      required: [email, authNumber]
      properties:
        email:
          type: string
          format: email
        authNumber:
          type: integer
          minimum: 100000
          maximum: 999999
    SignUpRequest:
      type: object
      additionalProperties: false
      required: [email, password, nickname, level]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        nickname:
          type: string
        level:
          type: integer
          minimum: 1
          maximum: 5
        profileImageKey:
          type:
            - string
            - 'null'
          pattern: '^images/(sign-up|users/\d+)/[A-Za-z0-9-]+\.(jpg|png|gif|webp)$'
    SignInRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    SignInResponse:
      type: object
      additionalProperties: false
      required: [accessToken, refreshToken, expiresAt]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: string
          format: date-time
    RefreshTokenRequest:
      type: object
      additionalProperties: false
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    RefreshTokenResponse:
      type: object
      additionalProperties: false
      required: [accessToken, expiresAt]
      properties:
        accessToken:
          type: string
        expiresAt:
          type: string
          format: date-time
    UserProfile:
      type: object
      additionalProperties: false
      required: [email, profileImage, description, nickname, temperature, level]
      properties:
        email:
          type: string
          format: email
        profileImage:
          type:
            - string
            - 'null'
        description:
          type:
            - string
            - 'null'
        nickname:
          type: string
        temperature:
          type: integer
        level:
          type: integer
          minimum: 1
          maximum: 5
    EditProfileRequest:
      type: object
      additionalProperties: false
      required: [description, nickname, level]
      properties:
        description:
          type:
            - string
            - 'null'
        nickname:
          type: string
        level:
          type: integer
          minimum: 1
          maximum: 5
        profileImageKey:
          type:
            - string
            - 'null'
    EditPasswordRequest:
      type: object
      additionalProperties: false
      required: [currentPassword, afterPassword]
      properties:
        currentPassword:
          type: string
          minLength: 8
        afterPassword:
          type: string
          minLength: 8
    DeleteUserRequest:
      type: object
      additionalProperties: false
      required: [password]
      properties:
        password:
          type: string
          minLength: 8
    ProfileImageUploadUrlRequest:
      type: object
      additionalProperties: false
      required: [contentType]
      properties:
        contentType:
          type: string
          enum: [image/jpeg, image/png, image/gif, image/webp]
    ProfileImageUploadUrlResponse:
      type: object
      additionalProperties: false
      required: [uploadUrl, formFields, objectKey, contentType, maxFileSizeBytes, expiresAt]
      properties:
        uploadUrl:
          type: string
          format: uri
        formFields:
          type: object
          additionalProperties:
            type: string
        objectKey:
          type: string
        contentType:
          type: string
        maxFileSizeBytes:
          type: integer
          format: int64
        expiresAt:
          type: string
          format: date-time
    MatchRole:
      type: string
      enum: [DESIGN, BACKEND, FRONTEND]
    MatchStatus:
      type: string
      enum: [WAITING, MATCHING, MATCHED, CANCELED]
    ProjectRequest:
      type: object
      additionalProperties: false
      required: [role]
      properties:
        role:
          $ref: '#/components/schemas/MatchRole'
        projectTitle:
          type:
            - string
            - 'null'
        projectDescription:
          type:
            - string
            - 'null'
        projectMvp:
          type:
            - string
            - 'null'
      description: If any project field is filled, projectTitle, projectDescription, and projectMvp must all be filled.
    ProjectRequestStatus:
      type: object
      additionalProperties: false
      required: [status, matchId]
      properties:
        status:
          $ref: '#/components/schemas/MatchStatus'
        matchId:
          type:
            - integer
            - 'null'
          format: int64
    MatchMemberResponse:
      type: object
      additionalProperties: false
      required: [matchId, members]
      properties:
        matchId:
          type: integer
          format: int64
        members:
          type: array
          items:
            $ref: '#/components/schemas/MatchMember'
    MatchMember:
      type: object
      additionalProperties: false
      required: [userId, nickname, role, level, temperature, profileImageKey, isHost, isAccepted]
      properties:
        userId:
          type: integer
          format: int64
        nickname:
          type: string
        role:
          $ref: '#/components/schemas/MatchRole'
        level:
          type: integer
        temperature:
          type: integer
        profileImageKey:
          type:
            - string
            - 'null'
        isHost:
          type: boolean
        isAccepted:
          type:
            - boolean
            - 'null'
    MatchProjectResponse:
      type: object
      additionalProperties: false
      required: [matchId, projectTitle, projectDescription, projectMvp]
      properties:
        matchId:
          type: integer
          format: int64
        projectTitle:
          type: string
        projectDescription:
          type: string
        projectMvp:
          type: string
  responses:
    BadRequest:
      description: Validation failed or business rule rejected the request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Authentication failed or the caller is not signed in
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Forbidden:
      description: The caller lacks permission for this operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Conflict:
      description: Resource state conflicts with the request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    BadGateway:
      description: Upstream email delivery failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    InternalServerError:
      description: Server data consistency error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
