openapi: 3.1.0
info:
  title: Team-po User API
  version: 0.1.0
  summary: Authentication and current-user endpoints for the Team-po frontend MVP.
  description: |
    Initial contract for the user-facing authentication flow used by the frontend
    routes `/login`, `/signup`, `/verify-email`, and `/me`.
servers:
  - url: /api
    description: Local API base path
tags:
  - name: Auth
    description: Authentication and email verification
  - name: Users
    description: User account resources
paths:
  /users/sign-in:
    post:
      tags:
        - Auth
      operationId: signInWithEmailPassword
      summary: Log in with email and password
      description: Issues a session token pair for the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  email: preview@teampo.dev
                  password: teampo123!
      responses:
        '200':
          description: Login completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                success:
                  value:
                    accessToken: mq_access_demo_token
                    refreshToken: mq_refresh_demo_token
                    expiresAt: '2026-03-08T18:30:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /users/sign-up:
    post:
      tags:
        - Users
      operationId: createUser
      summary: Sign up a new user
      description: Creates a user account with email/password authentication and an optional uploaded profile image key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            examples:
              default:
                value:
                  email: new.dev@teampo.dev
                  password: teampo123!
                  nickname: sprintmaker
                  level: 3
                  profileImageKey: images/sign-up/avatar.png
      responses:
        '200':
          description: User created
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/email-verifications:
    post:
      tags:
        - Auth
      operationId: resendEmailVerification
      summary: Resend a verification email
      description: Reissues a verification message for an existing user account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendEmailVerificationRequest'
            examples:
              default:
                value:
                  email: new.dev@teampo.dev
      responses:
        '200':
          description: Verification email queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendEmailVerificationResponse'
              examples:
                success:
                  value:
                    email: new.dev@teampo.dev
                    deliveryStatus: queued
                    resendAfterSeconds: 60
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /auth/email-verifications/confirm:
    post:
      tags:
        - Auth
      operationId: confirmEmailVerification
      summary: Confirm an email verification token
      description: Marks the user email as verified when a valid token is submitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmEmailVerificationRequest'
            examples:
              default:
                value:
                  email: new.dev@teampo.dev
                  token: TEAMPO-2026
      responses:
        '200':
          description: Email confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmEmailVerificationResponse'
              examples:
                success:
                  value:
                    user:
                      email: new.dev@teampo.dev
                      nickname: sprintmaker
                      profileImage: https://images.teampo.dev/profiles/sprintmaker.png
                      description: null
                      level: 3
                      temperature: 50
                    verifiedAt: '2026-03-08T07:03:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /users/me:
    get:
      tags:
        - Users
      operationId: getCurrentUser
      summary: Get the current user profile
      description: Returns the authenticated user's profile for the `/me` page.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                success:
                  value:
                    email: preview@teampo.dev
                    nickname: queue_runner
                    profileImage: https://images.teampo.dev/profiles/preview.png
                    description: 빠르게 실험하고, 팀원과 맥락을 맞추는 일을 좋아합니다.
                    level: 3
                    temperature: 50
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Users
      operationId: updateCurrentUser
      summary: Update the current user profile
      description: Updates the nickname, level, description, and optional uploaded profile image key for the signed-in user. Email cannot be changed.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCurrentUserRequest'
            examples:
              default:
                value:
                  nickname: sprintmaker_v2
                  level: 4
                  description: 협업 속도를 높이는 프론트엔드 개발자입니다.
                  profileImageKey: images/users/1/avatar.png
      responses:
        '200':
          description: Current user updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Users
      operationId: deleteCurrentUser
      summary: Delete the current user account
      description: Deletes the signed-in user's account.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Account deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      additionalProperties: false
      required:
        - email
        - nickname
        - profileImage
        - description
        - level
        - temperature
      properties:
        email:
          type: string
          format: email
          examples:
            - preview@teampo.dev
        nickname:
          type: string
          minLength: 2
          maxLength: 24
          examples:
            - queue_runner
        profileImage:
          type:
            - string
            - 'null'
          format: uri
          examples:
            - https://images.teampo.dev/profiles/preview.png
        description:
          type:
            - string
            - 'null'
          examples:
            - 빠르게 실험하고, 팀원과 맥락을 맞추는 일을 좋아합니다.
        level:
          type: integer
          minimum: 1
          maximum: 5
        temperature:
          type: integer
          minimum: 0
          maximum: 100
    Session:
      type: object
      additionalProperties: false
      required:
        - accessToken
        - refreshToken
        - expiresAt
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: string
          format: date-time
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
    LoginResponse:
      $ref: '#/components/schemas/Session'
    CreateUserRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
        - nickname
        - level
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
        nickname:
          type: string
          minLength: 2
          maxLength: 24
        level:
          type: integer
          minimum: 1
          maximum: 5
        profileImageKey:
          type:
            - string
            - 'null'
          description: Object key returned by the profile image upload-url endpoint.
    VerificationDeliveryStatus:
      type: string
      enum:
        - queued
        - sent
        - throttled
    VerificationDelivery:
      type: object
      additionalProperties: false
      required:
        - email
        - deliveryStatus
        - resendAfterSeconds
      properties:
        email:
          type: string
          format: email
        deliveryStatus:
          $ref: '#/components/schemas/VerificationDeliveryStatus'
        resendAfterSeconds:
          type: integer
          minimum: 0
    CreateUserResponse:
      type: object
      additionalProperties: false
      required:
        - user
        - verification
      properties:
        user:
          $ref: '#/components/schemas/User'
        verification:
          $ref: '#/components/schemas/VerificationDelivery'
    ResendEmailVerificationRequest:
      type: object
      additionalProperties: false
      required:
        - email
      properties:
        email:
          type: string
          format: email
    ResendEmailVerificationResponse:
      $ref: '#/components/schemas/VerificationDelivery'
    ConfirmEmailVerificationRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - token
      properties:
        email:
          type: string
          format: email
        token:
          type: string
          minLength: 6
          maxLength: 128
    ConfirmEmailVerificationResponse:
      type: object
      additionalProperties: false
      required:
        - user
        - verifiedAt
      properties:
        user:
          $ref: '#/components/schemas/User'
        verifiedAt:
          type: string
          format: date-time
    GetCurrentUserResponse:
      $ref: '#/components/schemas/User'
    UpdateCurrentUserRequest:
      type: object
      additionalProperties: false
      required:
        - nickname
        - level
        - description
      properties:
        nickname:
          type: string
          minLength: 2
          maxLength: 24
        level:
          type: integer
          minimum: 1
          maximum: 5
        description:
          type:
            - string
            - 'null'
        profileImageKey:
          type:
            - string
            - 'null'
          description: Object key returned by the profile image upload-url endpoint.
    UpdateCurrentUserResponse:
      $ref: '#/components/schemas/User'
    ApiError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          examples:
            - invalid_credentials
        message:
          type: string
          examples:
            - Email or password is incorrect.
        fieldErrors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          examples:
            email:
              - Enter a valid email address.
            password:
              - Password must be at least 8 characters long.
  responses:
    BadRequest:
      description: Validation failed or the request payload was malformed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            invalidPayload:
              value:
                code: validation_failed
                message: Request validation failed.
                fieldErrors:
                  email:
                    - Enter a valid email address.
    Unauthorized:
      description: Authentication failed or the caller is not signed in
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            invalidCredentials:
              value:
                code: invalid_credentials
                message: Email or password is incorrect.
    Conflict:
      description: Resource state conflicts with the request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            duplicateEmail:
              value:
                code: email_already_exists
                message: An account with this email already exists.
                fieldErrors:
                  email:
                    - Use a different email address.
    NotFound:
      description: The requested user or verification request was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            missingUser:
              value:
                code: user_not_found
                message: No user account matches the provided email.
    InternalServerError:
      description: Unexpected backend failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            generic:
              value:
                code: internal_server_error
                message: Something went wrong while processing the request.
