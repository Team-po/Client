openapi: 3.1.0
info:
  title: Team-po Server API
  version: 0.6.0
  summary: Client-facing contract mirrored from the current Spring controllers.
servers:
  - url: /api
    description: API base path
tags:
  - name: Auth
  - name: Users
  - name: Match
  - name: ProjectGroups
  - name: ProjectChecklists
  - name: Chat
  - name: TeamSpace
paths:
  /signup/email:
    post:
      tags: [Auth]
      summary: Send a signup email auth number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendEmailRequest'
      responses:
        '200':
          description: Auth number sent
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/BadGateway'
  /signup/number-validation:
    post:
      tags: [Auth]
      summary: Validate a signup email auth number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateAuthNumberRequest'
      responses:
        '200':
          description: Auth number validated
        '400':
          $ref: '#/components/responses/BadRequest'
  /users/sign-up:
    post:
      tags: [Users]
      summary: Sign up after email auth validation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '200':
          description: User created
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /users/profile-image/upload-url:
    post:
      tags: [Users]
      summary: Create a signup profile image POST upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileImageUploadUrlRequest'
      responses:
        '200':
          description: Upload URL issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileImageUploadUrlResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /users/check-email:
    get:
      tags: [Users]
      summary: Check whether an email is available
      parameters:
        - in: query
          name: email
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Email is available
        '409':
          $ref: '#/components/responses/Conflict'
  /users/sign-in:
    post:
      tags: [Auth]
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: Signed in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignInResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/password-reset:
    post:
      tags: [Auth]
      summary: Request a password reset email
      description: |
        Always returns the same success response for valid email-shaped input so
        callers cannot distinguish missing, GitHub-only, or password-backed
        accounts from this endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestPasswordResetRequest'
      responses:
        '200':
          description: Password reset email accepted when the account can use password login
        '400':
          $ref: '#/components/responses/BadRequest'
  /users/password-reset/confirm:
    post:
      tags: [Auth]
      summary: Complete password reset with a single-use token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset completed
        '400':
          $ref: '#/components/responses/BadRequest'
  /oauth/github/token:
    post:
      tags: [Auth]
      summary: Exchange a GitHub OAuth authorization code
      description: |
        Exchanges the short-lived code appended to `/oauth/github/callback` after
        GitHub OAuth success for a Team-po session token pair. When
        `onboardingRequired=true` was included in the callback query, `level` is
        required so the backend can create the GitHub-backed user account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GithubOAuthTokenRequest'
      responses:
        '200':
          description: GitHub OAuth login completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignInResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /oauth/github/link-requests:
    post:
      tags: [Auth]
      security:
        - bearerAuth: []
      summary: Start GitHub account linking for the current user
      responses:
        '200':
          description: GitHub OAuth authorization URL issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GithubLinkStartResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /oauth/github/account:
    delete:
      tags: [Auth]
      security:
        - bearerAuth: []
      summary: Unlink the current user's GitHub account
      responses:
        '204':
          description: GitHub account unlinked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /users/refresh-token:
    post:
      tags: [Auth]
      summary: Refresh an access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Access token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/me:
    get:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Get the current user's profile
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Update the current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditProfileRequest'
      responses:
        '200':
          description: Profile updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Soft-delete the current user
      responses:
        '200':
          description: User deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/me/deletion-email:
    post:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Send a deletion auth number to the current user's email
      responses:
        '200':
          description: Deletion auth number sent
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/BadGateway'
  /users/me/deletion-number-validation:
    post:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Validate a deletion auth number for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateDeleteUserEmailRequest'
      responses:
        '200':
          description: Deletion auth number validated
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/me/profile-image/upload-url:
    post:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Create a profile update image POST upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileImageUploadUrlRequest'
      responses:
        '200':
          description: Upload URL issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileImageUploadUrlResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/me/password:
    put:
      tags: [Users]
      security:
        - bearerAuth: []
      summary: Change the current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditPasswordRequest'
      responses:
        '200':
          description: Password changed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /match/request:
    post:
      tags: [Match]
      security:
        - bearerAuth: []
      summary: Create a project matching request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectRequest'
      responses:
        '200':
          description: Request created
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /match/status:
    get:
      tags: [Match]
      security:
        - bearerAuth: []
      summary: Get the current user's active match request status
      responses:
        '200':
          description: Active status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectRequestStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /match/members:
    get:
      tags: [Match]
      security:
        - bearerAuth: []
      summary: Get members in the current user's active match session
      responses:
        '200':
          description: Match members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchMemberResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /match/project:
    get:
      tags: [Match]
      security:
        - bearerAuth: []
      summary: Get the host project details for the current user's active match session
      responses:
        '200':
          description: Match project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /match/accept:
    post:
      tags: [Match]
      security:
        - bearerAuth: []
      summary: Accept the current user's active match session
      responses:
        '200':
          description: Match accepted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /match/reject:
    post:
      tags: [Match]
      security:
        - bearerAuth: []
      summary: Reject the current user's active match session
      responses:
        '200':
          description: Match rejected
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /match/cancel:
    post:
      tags: [Match]
      security:
        - bearerAuth: []
      summary: Cancel the current user's waiting or matching request
      responses:
        '200':
          description: Match request canceled
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /project-groups/me:
    get:
      tags: [ProjectGroups]
      security:
        - bearerAuth: []
      summary: Get the current user's active project group
      responses:
        '200':
          description: Current user's active project group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMyProjectGroupResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /project-groups/{projectGroupId}/name:
    patch:
      tags: [ProjectGroups]
      security:
        - bearerAuth: []
      summary: Update a project group's display name
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectGroupNameRequest'
      responses:
        '200':
          description: Project group name updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /project-groups/{projectGroupId}/admins/{targetUserId}:
    patch:
      tags: [ProjectGroups]
      security:
        - bearerAuth: []
      summary: Grant admin permission to a project group member
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
        - $ref: '#/components/parameters/TargetUserId'
      responses:
        '200':
          description: Admin permission granted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [ProjectGroups]
      security:
        - bearerAuth: []
      summary: Revoke admin permission from a project group member
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
        - $ref: '#/components/parameters/TargetUserId'
      responses:
        '200':
          description: Admin permission revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /project-groups/{projectGroupId}/finish:
    patch:
      tags: [ProjectGroups]
      security:
        - bearerAuth: []
      summary: Agree to finish an active project group
      description: Records the current member's finish agreement. The project group is finished after all required members agree.
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
      responses:
        '200':
          description: Finish agreement recorded
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /project-groups/{projectGroupId}/checklists:
    get:
      tags: [ProjectChecklists]
      security:
        - bearerAuth: []
      summary: Get project group checklists
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
      responses:
        '200':
          description: Project checklist list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectChecklist'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [ProjectChecklists]
      security:
        - bearerAuth: []
      summary: Create a project group checklist
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectChecklistRequest'
      responses:
        '201':
          description: Project checklist created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectChecklist'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /project-groups/{projectGroupId}/checklists/{checklistId}:
    patch:
      tags: [ProjectChecklists]
      security:
        - bearerAuth: []
      summary: Update a project group checklist
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
        - $ref: '#/components/parameters/ChecklistId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectChecklistRequest'
      responses:
        '200':
          description: Project checklist updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectChecklist'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [ProjectChecklists]
      security:
        - bearerAuth: []
      summary: Delete a project group checklist
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
        - $ref: '#/components/parameters/ChecklistId'
      responses:
        '204':
          description: Project checklist deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /project-groups/{projectGroupId}/checklists/{checklistId}/advice:
    post:
      tags: [ProjectChecklists]
      security:
        - bearerAuth: []
      summary: Generate AI advice for a project group checklist
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
        - $ref: '#/components/parameters/ChecklistId'
      responses:
        '200':
          description: Checklist advice generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateChecklistAdviceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /project-groups/{projectGroupId}/chat/messages:
    get:
      tags: [Chat]
      security:
        - bearerAuth: []
      summary: Get project group chat messages
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
        - in: query
          name: beforeMessageId
          required: false
          schema:
            type: integer
            format: int64
          description: Return messages older than this message id.
        - in: query
          name: size
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 30
      responses:
        '200':
          description: Project group chat message page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessagePage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /project-groups/{projectGroupId}/chat/read:
    patch:
      tags: [Chat]
      security:
        - bearerAuth: []
      summary: Mark project group chat messages as read
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkChatReadRequest'
      responses:
        '200':
          description: Chat read state updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatReadState'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /team-space/{projectGroupId}/dev-guide:
    get:
      tags: [TeamSpace]
      security:
        - bearerAuth: []
      summary: Get AI development guide for a team space
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
      responses:
        '200':
          description: AI development guide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevGuideQueryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /team-space/{projectGroupId}/dev-guide/history:
    get:
      tags: [TeamSpace]
      security:
        - bearerAuth: []
      summary: Get AI development guide version history
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
      responses:
        '200':
          description: AI development guide version history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevGuideHistoryListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /team-space/{projectGroupId}/dev-guide/history/{devGuideId}:
    get:
      tags: [TeamSpace]
      security:
        - bearerAuth: []
      summary: Get AI development guide version content
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
        - $ref: '#/components/parameters/DevGuideId'
      responses:
        '200':
          description: AI development guide version content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevGuideHistoryContentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /team-space/{projectGroupId}/dev-guide/regenerate:
    post:
      tags: [TeamSpace]
      security:
        - bearerAuth: []
      summary: Regenerate AI development guide for a team space
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DevGuideRegenerateRequest'
      responses:
        '200':
          description: AI development guide regenerated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevGuideRegenerateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /team-space/{projectGroupId}/dev-guide/{devGuideId}/confirm:
    post:
      tags: [TeamSpace]
      security:
        - bearerAuth: []
      summary: Confirm an AI development guide version
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
        - $ref: '#/components/parameters/DevGuideId'
      responses:
        '200':
          description: AI development guide version confirmed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /team-space/{projectGroupId}/team-rule:
    get:
      tags: [TeamSpace]
      security:
        - bearerAuth: []
      summary: Get team rule for a team space
      parameters:
        - $ref: '#/components/parameters/ProjectGroupId'
      responses:
        '200':
          description: Team rule
